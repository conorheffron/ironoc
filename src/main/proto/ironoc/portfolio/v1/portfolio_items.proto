syntax = "proto3";

package ironoc.portfolio.v1;

option java_multiple_files = true;
option java_outer_classname = "PortfolioItemsProto";
option java_package = "net.ironoc.portfolio.contract.v1";

service PortfolioItemsService {
  rpc ListPortfolioItems(ListPortfolioItemsRequest) returns (ListPortfolioItemsResponse);
}

message ListPortfolioItemsRequest {
  int32 page_size = 1;
  string page_token = 2;
}

message ListPortfolioItemsResponse {
  repeated PortfolioItem items = 1;
  string next_page_token = 2;
}

message PortfolioItem {
  string title = 1;
  string description = 2;
  string tech_stack = 3;
  string link = 4;
  string image_theme = 5;
  string image_alt = 6;
}
